<head>
    <!DOCTYPE html>
    <html lang="en">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    
    <style>

        .iniCard-font {
            font-family: "Roboto Condensed", sans-serif;
            font-optical-sizing: auto;
            font-weight: 300;
            font-style: normal;

            color: #F0F0F0;
            text-align: center;
            font-family: "Roboto Condensed";
            font-size: 128px;
            font-style: normal;
            font-weight: 700;
        }

        .inter {
            font-family: "Inter", sans-serif;
            font-optical-sizing: auto;
            font-style: normal;
            font-weight: 400;
        }

        .inter-header {
            color: #F0F0F0;
            text-align: center;
            font-family: Inter;
            font-size: 16px;
            font-style: normal;
            font-weight: 400;
            line-height: 95%; /* 30.4px */
            letter-spacing: -1px;
        }

        #screen {
            display: flex;
            flex-direction: column;
            background: #131313;
            width: 100%;
            justify-content: center;
            align-items: center;
            margin: 0;
            gap: 32px;
        }

        #iniCard {
            display: flex;
            width: 200px;
            height: 300px;
            padding: 8px 8px;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: transparent;
            border: 4px solid #F0F0F0;
        }
        
        #myInput {
            font-size: 128px;
            text-align: center;
            max-width: 156px;
            max-height: 720px;
            border: 8px solid black;
        }

        #button {
            display: inline-flex;
            padding: 24px 32px;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        #iniEnterInput {
            background: #F0F0F0;
            color: #131313;
            font-family: Inter;
            font-size: 24px;
            font-weight: 500;
            line-height: 95%;
            letter-spacing: -1px;
            width: 164px; 
            height: 48px;
            border: #F0F0F0 solid 2px;
            border-left: #F0F0F0 solid 6px;
        }

        #addBtn {
            height: 48px; 
            width: 48px;
            align-items: center;
            display: flex;            
        }

        .btnCalc {
            opacity: 1;
            background: #F0F0F0;
            color: #131313;
            text-align: center;
            font-family: Inter;
            font-size: 32px;
            font-style: bold;
            font-weight: 700;
            line-height: 98%; /* 30.4px */
            letter-spacing: -1px;
            text-transform: capitalize;
        }

        #iniCardsDisplay {
            display: flex; 
            gap: 24px; 
            align-items: center;
        }
        
        </style>

</head>

<body id="screen">
    <p style="font-family: 'Inter'; color: #131313; margin: 16px; background-color: yellow; width: 640; align-items: center; justify-content: center; text-align: center;">The page is under construction!</p>

    <h1 class="inter-header">
        Dungeons & Dragons <br> Initiative Sorter
    </h1>

    <div style="display: inline-flex;
        align-items: center;
        gap: 16px;">

        <input 
            id="iniEnterInput"
            type="number"
            placeholder="Add initiative">

        <button 
            id = "addBtn"
            onclick="createCard()">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 80 80" fill="none">
                <rect width="80" height="80"/>
                <path d="M43.9922 35.9951H64V43.9951H43.9922V64H35.9922V43.9951H16V35.9951H35.9922V16H43.9922V35.9951Z" fill="#131313"/>
            </svg>
        </button>

    </div>
    <div id="iniCardsDisplay">
    </div>

    <button 
        class="btnCalc" 
        id="button"
        onclick="sortCards()">
        Calculate
    </button>

    <script>
        let inits = []

        function render() {
            const displayID = document.getElementById("iniCardsDisplay")
            displayID.innerHTML = ""

            inits.forEach(num => {
                const card = document.createElement("div");
                card.classList.add("iniCard-font");
                card.setAttribute("id", "iniCard")
                card.textContent = num;
                displayID.appendChild(card);
            });
        }

        function createCard() {
            const input = document.getElementById("iniEnterInput");
            const inputValue = parseInt(input.value, 10);

            if (isNaN(inputValue)) {
                alert("Please enter a number")
                return;
            }
            if (inputValue < 0 || inputValue > 99) {
                alert("Please enter a number between 0 and 99")
                return;
            }
            
            inits.push(inputValue);
            console.log("updated " + inits);

            input.value = "";
            input.focus();
            console.log("input cleared")

            render()
        }

        function sortCards() {
            inits.sort(function(a, b){return b - a});
            console.log("sorted " + inits)

            render()
        }

        const enterBtn = document.getElementById("addBtn");
        enterBtn.addEventListener("click", () => console.log("clicky!"));
        window.addEventListener("keydown", ({key}) => {
            if (key == "Enter")
                enterBtn.click();
        })

    </script>

</body>
