<head>
    <!DOCTYPE html>
    <html lang="en">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    
    <style>
        body {
            background: #131313; 
            height: 100%; 
            display: flex; 
            flex-direction: column;
            align-items: center;
        }
        .header {
            color: #F0F0F0;
            text-align: center;
            font-family: Inter;
            font-size: 16px;
            font-style: normal;
            font-weight: 400;
            line-height: 95%; /* 30.4px */
            letter-spacing: -1px;
        }

        .footer {
            position: bottom;
            bottom: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 64px;
            gap: 16px;
        }

        .main {
            display: flex;
            flex: 1;
            flex-direction: column;
            width: 100%;
            justify-content: center;
            align-items: center;
            margin: 0;
            gap: 32px;
        }

        #iniCard {
            display: flex;
            flex-shrink: 0;
            position: relative;
            width: 128px;
            height: 192px;
            padding: 8px 8px;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: transparent;
            border: 4px solid #F0F0F0;
        }

        .iniCard-font {
            font-family: "Roboto Condensed", sans-serif;
            font-optical-sizing: auto;
            font-weight: 300;
            font-style: normal;
            color: #F0F0F0;
            text-align: center;
            font-family: "Roboto Condensed";
            font-size: 98px;
            font-style: normal;
            font-weight: 700;
        }

        #iniCardsDisplay {
            display: flex; 
            gap: 24px; 
            align-items: center;
            justify-content: flex-start;
            margin: 0 auto;
            width: 100%;            
            overflow-x: auto;
            overflow-y: hidden;
        }

        #iniEnterInput {
            background: #F0F0F0;
            color: #131313;
            font-family: Inter;
            font-size: 24px;
            font-weight: 500;
            line-height: 95%;
            letter-spacing: -1px;
            width: 164px; 
            height: 48px;
        }

        #button {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-family: Inter;
        }

        #addBtn {
            height: 48px; 
            width: 48px;
            align-items: center;
            display: flex;            
        }

        .btnCalc {
            background: #F0F0F0;
            color: #131313;
            padding: 16px 32px;
            font-size: 24px;
            font-weight: 700;
            line-height: 98%; /* 30.4px */
            letter-spacing: -1px;
        }

        .btnContact {
            background: transparent;
            color: #F0F0F0;
            font-size: 16px;
            font-weight: 300;
            line-height: 98%; /* 30.4px */
            letter-spacing: 0px;
        }

        .btnRemove {
            position: absolute; 
            top: 0%; 
            right: 0%;
            background: #F0F0F0;
            color: #131313;
            font-size: 32px;
            font-weight: 700;
            line-height: 98%; /* 30.4px */
            letter-spacing: 0px;
        }
        
    </style>

</head>

<body>
    <h1 class="header">
        Dungeons & Dragons <br> Initiative Sorter
    </h1>

    <div class="main">
        <div style="display: inline-flex; align-items: center; gap: 16px;">
            <input 
                id="iniEnterInput"
                type="number"
                placeholder="Add initiative">
            <button 
                id = "addBtn"
                onclick="createCard()">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 80 80" fill="none">
                    <rect width="80" height="80"/>
                    <path d="M43.9922 35.9951H64V43.9951H43.9922V64H35.9922V43.9951H16V35.9951H35.9922V16H43.9922V35.9951Z" fill="#131313"/>
                </svg>
            </button>

        </div>
        
        <div id="iniCardsDisplay">
        </div>

        <button 
            class="btnCalc" 
            id="button"
            onclick="sortCards()">
            Calculate
        </button>
    </div>
    
    <div class="footer">
        <a href="https://github.com/SirArsen1/Dungeons-And-Dragons-Initiative-Sorter" 
            class="btnContact" 
            id="button">
            GitHub
        </a>
        <a style="color:#F0F0F0">|</a>        
        <a href="https://github.com/SirArsen1/Dungeons-And-Dragons-Initiative-Sorter/issues" 
            class="btnContact" 
            id="button">
            Report
        </a>
        <a style="color:#F0F0F0">|</a>
        <a href="https://planet-nose-f59.notion.site/Progress-of-D-D-Initiative-Sorter-39d380ac3809801da994da5e5fb05785?source=copy_link" 
            class="btnContact" 
            id="button">
            Roadmap
        </a>
    </div>

    <script>

        let inits = [];
        let initialCardId = 1;

        function render() {
            const displayID = document.getElementById("iniCardsDisplay")
            displayID.innerHTML = ""

            inits.forEach(item => {
                const card = document.createElement("div");
                card.classList.add("iniCard-font");
                card.setAttribute("id", "iniCard");
                card.setAttribute("data-id", item.id)
                card.textContent = item.value;
                displayID.appendChild(card);

                const removeBtn = document.createElement("button");
                removeBtn.classList.add("btnRemove");
                removeBtn.setAttribute("id", "Button");
                removeBtn.textContent = "X";
                removeBtn.addEventListener("click", function (e) {
                    e.preventDefault();
                    removeCard(card);
                });
                card.appendChild(removeBtn);
            });
        }

        function createCard() {
            const input = document.getElementById("iniEnterInput");
            const inputValue = parseInt(input.value, 10);
            const cardId = initialCardId;
            
            initialCardId++;

            if (isNaN(inputValue)) {
                alert("Please enter a number")
                return;
            }
            if (inputValue < 0 || inputValue > 99) {
                alert("Please enter a number between 0 and 99")
                return;
            }

            inits.push({id:cardId, value:inputValue});
            console.log("updated " + inits);

            input.value = "";
            input.focus();
            console.log("input cleared")

            render()
        }

        function removeCard(card) {
            const clickedId = parseInt(card.getAttribute("data-id"), 10);
            const index = inits.findIndex(entry => entry.id === clickedId);

            if (index !== -1) {
                inits.splice(index, 1);
            }

            card.remove();
        }

        function sortCards() {
            inits.sort((a, b) => b.value - a.value);
            console.log("sorted " + inits.values)

            render()
        }

        const enterBtn = document.getElementById("addBtn");
        enterBtn.addEventListener("click", () => console.log("clicky!"));
        window.addEventListener("keydown", ({key}) => {
            if (key == "Enter")
                enterBtn.click();
        })

    </script>

</body>
