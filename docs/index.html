<head>
    <!DOCTYPE html>
    <html lang="en">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    
    <style>

        .roboto-condensed-iniCard {
            font-family: "Roboto Condensed", sans-serif;
            font-optical-sizing: auto;
            font-weight: 300;
            font-style: normal;

            color: #F0F0F0;
            text-align: center;
            font-family: "Roboto Condensed";
            font-size: 128px;
            font-style: normal;
            font-weight: 700;
        }

        .inter {
            font-family: "Inter", sans-serif;
            font-optical-sizing: auto;
            font-style: normal;
            font-weight: 400;
        }

        .inter-header {
            color: #F0F0F0;
            text-align: center;
            font-family: Inter;
            font-size: 16px;
            font-style: normal;
            font-weight: 400;
            line-height: 95%; /* 30.4px */
            letter-spacing: -1px;
        }

        #screen {
            display: flex;
            flex-direction: column;
            background: #131313;
            width: 100%;
            justify-content: center;
            align-items: center;
            margin: 0;
            gap: 32px;
        }

        #iniCard {
            display: flex;
            width: 200px;
            height: 300px;
            padding: 8px 8px;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: transparent;
            border: 4px solid #F0F0F0;
        }
        
        #myInput {
            font-size: 128px;
            text-align: center;
            max-width: 156px;
            max-height: 720px;
            border: 8px solid black;
        }

        #button {
            display: inline-flex;
            padding: 24px 32px;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .iniEnterInput {
            background: #F0F0F0;
            color: #131313;
            font-family: Inter;
            font-size: 24px;
            font-weight: 500;
            line-height: 95%;
            letter-spacing: -1px;
            width: 164px; 
            height: 48px;
            border: #F0F0F0 solid 2px;
            border-left: #F0F0F0 solid 6px;
        }

        .inter-bold-btnCalc {
            opacity: 0.3;
            background: #F0F0F0;
            color: #131313;
            text-align: center;
            font-family: Inter;
            font-size: 32px;
            font-style: bold;
            font-weight: 700;
            line-height: 98%; /* 30.4px */
            letter-spacing: -1px;
            text-transform: capitalize;
        }

        #iniCardsDisplay {
            display: flex; 
            gap: 24px; 
            align-items: center;
        }
        
        </style>

</head>

<body id="screen">
    <p style="font-family: 'Inter'; color: #131313; margin: 16px; background-color: yellow; width: 640; align-items: center; justify-content: center; text-align: center;">The page is under construction!</p>

    <h1 class="inter-header">
        Dungeons & Dragons <br> Initiative Sorter
    </h1>

    <div style="display: inline-flex;
        align-items: center;
        gap: 16px;">

        <input 
            class="iniEnterInput"
            type="number"
            maxlength="2" 
            placeholder="Add initiative"
            min="0"
            max="99">

        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 80 80" fill="none">
            <rect width="80" height="80" fill="#F0F0F0"/>
            <path d="M43.9922 35.9951H64V43.9951H43.9922V64H35.9922V43.9951H16V35.9951H35.9922V16H43.9922V35.9951Z" fill="#131313"/>
        </svg>

    </div>

    <div id="iniCardsDisplay">
        <div 
            id="iniCard"
            class="roboto-condensed-iniCard"
            style="opacity: 30%;">
            00
        </div>
    </div>

    <div class="inter-bold-btnCalc" id="button">
        Calculate
    </div>
    
</body>
